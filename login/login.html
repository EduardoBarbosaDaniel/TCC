<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="container">
        <div class="form-image">
            <img src="img/fundo_pão.jpg">
        </div>
        <div class="form">
            <form method="POST" action="">
                <div class="form-header">
                    <div class="title">
                        <h1>Bem-vindo</h1>
                    </div>
                </div>

                <div class="input-group login-group">
                    <div class="input-box ">
                        <label for="firstname"> Usuário</label>
                        <input id="firstname" type="text" name="user" placeholder="Digite seu usuário" required>
                    </div>


                    <div class="input-box">
                        <label for="lastname"> Senha</label>
                        <input id="lastname" type="text" name="password" placeholder="Digite sua senha" required>
                    </div>
                </div>
                <div class="continue-button"> <button><a href="">Continuar</a></button></div>
            </div>         
         </form>
    </div>
    </div>
</body>

</html>
